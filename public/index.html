<!DOCTYPE html>
<html lang="pt-BR">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="https://htmx.org/favicon.svg" type="image/svg+xml" />
        <script src="https://cdn.jsdelivr.net/npm/htmx.org@2/dist/htmx.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/htmx-ext-response-targets@2/dist/response-targets.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <script src="/public/js/script.js" defer></script>
        <title>DevClientes</title>
    </head>

    <body class="bg-neutral-900 w-full h-full" hx-ext="response-targets">
        <header class="text-white font-semibold absolute top-8 right-8">
            <div id="toast-notification"              class="empty:hidden bg-green-400 py-4 px-8 rounded-md"></div>
            <div id="client-error-toast-notification" class="empty:hidden bg-red-400 py-4 px-8 rounded-md"></div>
            <div id="server-error-toast-notification" class="empty:hidden bg-red-400 py-4 px-8 rounded-md"></div>
        </header>
        <main class="py-14">
            <h1 class="text-gray-400 text-center font-bold text-4xl mb-4">DevClientes</h1>
            <form
                id="form-customers"
                class="
                  bg-slate-200
                    w-full
                    max-w-3xl
                    mx-auto
                    p-4
                    rounded
                    flex
                    flex-col
                    justify-center
                    items-center
                    gap-4
                "
                hx-post="/api/customers"
                hx-target-2*="#toast-notification"
                hx-target-4*="#client-error-toast-notification"
                hx-target-5*="#server-error-toast-notification"
            >
                <div class="w-full">
                    <label
                        for="name"
                        class="
                            font-bold
                            text-lg
                        "
                    >
                        Nome completo
                    </label>
                    <input
                        type="text"
                        name="name"
                        id="name"
                        class="
                            w-full
                            my-1
                            p-1
                            rounded
                            bg-white
                        "
                        placeholder="Digite seu nome completo..."
                        autocapitalize="words"
                        pattern="((\p{Lu}\p{Ll}{3,99})\s?)+"
                        required
                    />
                </div>
                <div class="w-full">
                    <label
                        for="email"
                        class="
                            font-bold
                            text-lg
                        "
                    >
                        E-mail
                    </label>
                    <input
                        type="email"
                        name="email"
                        id="email"
                        class="
                            w-full
                            my-1
                            p-1
                            rounded
                            bg-white
                        "
                        placeholder="Digite seu e-mail..."
                        autocapitalize="none"
                        required
                    />
                </div>
                <div class="w-full">
                    <label
                        for="role"
                        class="
                            font-bold
                            text-lg
                        "
                    >
                        Cargo
                    </label>
                    <select
                        name="role"
                        id="role"
                        class="
                            w-full
                            my-1
                            p-1
                            rounded
                            bg-white
                        "
                        required
                    >
                        <option value="" disabled selected>Selecione uma opção...</option>
                        <option value="fullstack">Full Stack</option>
                        <option value="backend">Back End</option>
                        <option value="frontend">Front End</option>
                    </select>
                </div>
                <div class="w-full">
                    <label
                        for="status"
                        class="
                            font-bold
                            text-lg
                            mr-2
                        "
                    >
                        Ativo
                    </label>
                    <input type="checkbox" name="status" id="status" />
                </div>
                <button
                    type="submit"
                    class="bg-blue-500 w-full rounded ptext-white font-semibold-2 font-medium"
                >
                    Salvar
                </button>
            </form>
            <ul
                id="list-customers"
                class="w-full max-w-3xl mx-auto mt-4"
                hx-get="/api/customers"
                hx-trigger="load"
                hx-target-4*="#client-error-list-notification"
                hx-target-5*="#server-error-list-notification"
            >
                <li id="client-error-list-notification" class="empty:hidden italic text-stone-900"></li>
                <li id="server-error-list-notification" class="empty:hidden bold text-red-300"></li>
            </ul>
        </main>
    </body>

</html>
