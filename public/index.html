<!DOCTYPE html>
<html lang="pt-BR">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="https://htmx.org/favicon.svg" type="image/svg+xml" />
        <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js" integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <title>DevClientes</title>
    </head>

    <body class="bg-neutral-900 w-full mx-auto px-2 max-w-7xl">
        <header>
            <div id="toast-notification"></div>
        </header>
        <main>
            <h1 class="text-gray-400 text-center font-bold text-4xl mt-14 mb-4">DevClientes</h1>
            <form
                id="form-customers"
                class="
                  bg-slate-200
                    w-full
                    max-w-3xl
                    mx-auto
                    p-4
                    rounded
                    flex
                    flex-col
                    justify-center
                    items-center
                    gap-4
                "
                hx-post="/api/customers"
                hx-target="#toast-notification"
            >
                <div class="w-full">
                    <label
                        for="name"
                        class="
                            font-bold
                            text-lg
                        "
                    >
                        Nome completo
                    </label>
                    <input
                        type="text"
                        name="name"
                        id="name"
                        placeholder="Digite seu nome completo..."
                        class="
                            w-full
                            my-1
                            p-1
                            rounded
                            bg-white
                        "
                        required
                    />
                </div>
                <div class="w-full">
                    <label
                        for="email"
                        class="
                            font-bold
                            text-lg
                        "
                    >
                        E-mail
                    </label>
                    <input
                        type="email"
                        name="email"
                        id="email"
                        placeholder="Digite seu e-mail..."
                        class="
                            w-full
                            my-1
                            p-1
                            rounded
                            bg-white
                        "
                        required
                    />
                </div>
                <div class="w-full">
                    <label
                        for="role"
                        class="
                            font-bold
                            text-lg
                        "
                    >
                        Cargo
                    </label>
                    <select
                        name="role"
                        id="role"
                        required
                        class="
                            w-full
                            my-1
                            p-1
                            rounded
                            bg-white
                        "
                    >
                        <option value="" disabled selected>Selecione uma opção...</option>
                        <option value="fullstack">Full Stack</option>
                        <option value="backend">Back End</option>
                        <option value="frontend">Front End</option>
                    </select>
                </div>
                <div class="w-full">
                    <label
                        for="status"
                        class="
                            font-bold
                            text-lg
                            mr-2
                        "
                    >
                        Ativo
                    </label>
                    <input type="checkbox" name="status" id="status" />
                </div>
                <button
                    type="submit"
                    class="bg-blue-500 w-full rounded p-2 font-medium text-white"
                >
                    Salvar
                </button>
            </form>
        </main>
    </body>

</html>
