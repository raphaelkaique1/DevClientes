<!DOCTYPE html>
<html lang="pt-BR">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="htmx-config" content='{"methodsThatUseUrlParams": ["get"]}' />
        <link rel="icon" href="https://htmx.org/favicon.svg" type="image/svg+xml" />
        <script src="https://cdn.jsdelivr.net/npm/htmx.org@2/dist/htmx.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/htmx-ext-response-targets@2/dist/response-targets.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <title>DevClientes</title>
        <style>
            /* HTML: <div class="loader"></div> */
            .loader {
                width: 50px;
                padding: 8px;
                aspect-ratio: 1;
                border-radius: 50%;
                background: #fff;
                --_m:
                    conic-gradient(#0000 10%, #000),
                    linear-gradient(#000 0 0) content-box;
                -webkit-mask: var(--_m);
                mask: var(--_m);
                -webkit-mask-composite: source-out;
                mask-composite: subtract;
                animation: l3 1s infinite linear;
            }

            .msg {
                animation: disappear 5s forwards;
            }

            @keyframes l3 {
                to {
                    transform: rotate(1turn)
                }
            }
        </style>
    </head>

    <body class="bg-neutral-900 w-full h-full" hx-ext="response-targets">
        <div
            id="toast-notification"
            class="text-white font-semibold absolute top-8 right-8 empty:hidden"
            hx-on::after-swap="event.detail.requestConfig.verb !== 'get' && setTimeout(() => this.innerText = '', 2000)"
        >
        </div>
        <main
            class="py-14"
            hx-on::after-request="if(event.detail.requestConfig.verb !== 'get' && event.detail.xhr.status >= 200) htmx.ajax('GET', '/api/customers', '#list-customers')"
        >
            <h1 class="text-gray-400 text-center font-bold text-4xl mb-4">DevClientes</h1>
            <form
                id="form-customers"
                class="
                  bg-slate-200
                    w-full
                    max-w-3xl
                    mx-auto
                    p-4
                    rounded
                    flex
                    flex-col
                    justify-center
                    items-center
                    gap-4
                "
                hx-post="/api/customers"
                hx-trigger="submit"
                hx-disabled-elt="#submit-save"
                hx-indicator="#loader"
                hx-target="#toast-notification"
                hx-target-error="#toast-notification"
                hx-on::after-request="event.detail.xhr.status === 201 && this.reset()"
            >
                <div class="w-full">
                    <label
                        for="name"
                        class="
                            font-bold
                            text-lg
                        "
                    >
                        Nome completo
                    </label>
                    <input
                        type="text"
                        name="name"
                        id="name"
                        class="
                            w-full
                            my-1
                            p-1
                            rounded
                            bg-white
                        "
                        placeholder="Digite seu nome completo..."
                        autocapitalize="words"
                        pattern="((\p{Lu}\p{Ll}{3,99})\s?)+"
                        required
                    />
                </div>
                <div class="w-full">
                    <label
                        for="email"
                        class="
                            font-bold
                            text-lg
                        "
                    >
                        E-mail
                    </label>
                    <input
                        type="email"
                        name="email"
                        id="email"
                        class="
                            w-full
                            my-1
                            p-1
                            rounded
                            bg-white
                        "
                        placeholder="Digite seu e-mail..."
                        autocapitalize="none"
                        required
                    />
                </div>
                <div class="w-full">
                    <label
                        for="role"
                        class="
                            font-bold
                            text-lg
                        "
                    >
                        Cargo
                    </label>
                    <select
                        name="role"
                        id="role"
                        class="
                            w-full
                            my-1
                            p-1
                            rounded
                            bg-white
                        "
                        required
                    >
                        <option value="" disabled selected>Selecione uma opção...</option>
                        <option value="fullstack">Full Stack</option>
                        <option value="backend">Back End</option>
                        <option value="frontend">Front End</option>
                    </select>
                </div>
                <div class="w-full">
                    <label
                        for="status"
                        class="
                            font-bold
                            text-lg
                            mr-2
                        "
                    >
                        Ativo
                    </label>
                    <input type="checkbox" name="status" id="status" />
                </div>
                <button
                    id="submit-save"
                    type="submit"
                    class="bg-blue-500 w-full rounded text-white font-semibold-2 font-medium flex justify-center items-center"
                >
                    Salvar
                </button>
            </form>
            <div class="loader htmx-indicator mx-auto my-2" id="loader"></div>
            <ul
                id="list-customers"
                class="w-full max-w-3xl mx-auto mt-4"
                hx-get="/api/customers"
                hx-indicator="#loader"
                hx-trigger="load"
            >
            </ul>
        </main>
    </body>

</html>
